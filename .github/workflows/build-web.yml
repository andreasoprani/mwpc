name: Build web game

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-web:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14

      - name: Build web version
        run: make web

      - name: Prepare distributable
        run: |
          mkdir -p dist
          cp web/mwpc.html dist/index.html
          cp web/mwpc.js dist/
          cp web/mwpc.wasm dist/
          cp web/mwpc.data dist/

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: mwpc-web
          path: dist/
          if-no-files-found: error

      - name: Package release artifact
        if: github.ref == 'refs/heads/main'
        run: |
          cd dist
          zip -r ../mwpc-web.zip .

      - name: Publish latest web build release
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          build_version="$(date -u +'%Y.%m.%d')-${GITHUB_SHA::7}"
          release_title="mwpc-web-build-${build_version}"
          release_notes="Automatically generated web build for sprn.it/mwpc from commit ${GITHUB_SHA}."

          if gh release view mwpc-web-latest >/dev/null 2>&1; then
            gh release edit mwpc-web-latest \
              --title "$release_title" \
              --notes "$release_notes"
          else
            gh release create mwpc-web-latest \
              --title "$release_title" \
              --notes "$release_notes"
          fi

          gh release upload mwpc-web-latest mwpc-web.zip --clobber
